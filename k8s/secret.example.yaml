apiVersion: v1
kind: Secret
metadata:
  name: monitoring-tool-secrets
  namespace: monitoring-tool
type: Opaque
stringData:
  DATABASE_URL: "<set-at-deploy-time>"
  JWT_SECRET: "<set-at-deploy-time>"
  SLACK_WEBHOOK_URL: "<set-at-deploy-time-or-empty>"
  ADMIN_USERNAME: "admin"
  ADMIN_PASSWORD: "<set-at-deploy-time>"
  VIEWER_USERNAME: "viewer"
  VIEWER_PASSWORD: "<set-at-deploy-time>"
